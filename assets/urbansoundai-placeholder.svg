<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#30d0ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="spec" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#30d0ff" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#7c5cff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#41f28c" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="46" fill="#0b1020"/>
  <rect width="1600" height="900" rx="46" fill="url(#bg)"/>

