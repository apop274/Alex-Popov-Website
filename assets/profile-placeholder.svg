<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#30d0ff" stop-opacity="0.75"/>
    </linearGradient>
    <radialGradient id="r" cx="30%" cy="25%" r="80%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>
  <rect width="900" height="900" rx="64" fill="#0b1020"/>
  <rect width="900" height="900" rx="64" fill="url(#g)" opacity="0.25"/>
  <circle cx="280" cy="220" r="260" fill="url(#r)" filter="url(#blur)" opacity="0.8"/>

  <g fill="none" stroke="#ffffff" opacity="0.18">
    <path d="M90 640 C 220 520, 360 520, 450 600 C 540 680, 700 680, 810 600" stroke-width="4"/>
    <path d="M90 700 C 230 610, 360 600, 460 660 C 560 720, 700 720, 810 650" stroke-width="3"/>
  </g>

  <g transform="translate(210 210)">
    <circle cx="240" cy="190" r="110" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>
    <path d="M120 520 C150 430, 210 370, 300 370 C390 370, 450 430, 480 520"
